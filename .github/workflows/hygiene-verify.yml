name: hygiene-verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  hygiene:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve commit range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ "$base" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              base=$(git rev-parse "$head^") || base="$head"
            fi
          fi
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "head=$head" >> "$GITHUB_OUTPUT"
          echo "scanning $base..$head"
          git log --oneline "$base..$head" || true

      - name: No Co-Authored-By Claude trailers
        # Uses git-interpret-trailers --parse so that prose containing the
        # literal token "Co-Authored-By" or "noreply@anthropic" does not trip
        # the gate — only an actual structured trailer counts.
        run: |
          set -euo pipefail
          base='${{ steps.range.outputs.base }}'
          head='${{ steps.range.outputs.head }}'
          leaks=""
          while read -r sha; do
            [ -z "$sha" ] && continue
            trailers=$(git log -1 --format=%B "$sha" | git interpret-trailers --parse)
            if printf '%s\n' "$trailers" | grep -qiE '^Co-Authored-By:.*claude|^[A-Za-z-]+:.*noreply@anthropic'; then
              leaks="$leaks $sha"
            fi
          done < <(git rev-list "$base..$head")
          if [ -n "$leaks" ]; then
            echo "FAIL: Co-Authored-By Claude / anthropic trailer found in:" >&2
            for sha in $leaks; do
              echo "  $sha $(git log -1 --format=%s "$sha")" >&2
            done
            exit 1
          fi
          echo "OK: no Co-Authored-By Claude trailers"

      - name: Subject length <=72 chars
        run: |
          set -euo pipefail
          base='${{ steps.range.outputs.base }}'
          head='${{ steps.range.outputs.head }}'
          fail=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            # Skip merge commits
            parents=$(git log -1 --format=%P "$sha" | wc -w | tr -d ' ')
            [ "$parents" -gt 1 ] && continue
            subj=$(git log -1 --format=%s "$sha")
            len=${#subj}
            if [ "$len" -gt 72 ]; then
              echo "FAIL: $sha subject is $len chars (>72): $subj" >&2
              fail=1
            fi
          done < <(git rev-list "$base..$head")
          [ "$fail" -eq 0 ] && echo "OK: all subjects <=72 chars"
          exit $fail

      - name: Subject lowercase imperative
        run: |
          set -euo pipefail
          base='${{ steps.range.outputs.base }}'
          head='${{ steps.range.outputs.head }}'
          fail=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            parents=$(git log -1 --format=%P "$sha" | wc -w | tr -d ' ')
            [ "$parents" -gt 1 ] && continue
            subj=$(git log -1 --format=%s "$sha")
            # Take the first word after the scope prefix "<scope>: " (or the
            # first word if no scope). Acronyms allowed (all-caps tokens).
            first=$(printf '%s' "$subj" | sed -E 's/^[^:]+: //' | awk '{print $1}')
            if [ -z "$first" ]; then
              continue
            fi
            if printf '%s' "$first" | grep -qE '^[A-Z]+$'; then
              continue
            fi
            firstchar=$(printf '%s' "$first" | cut -c1)
            if printf '%s' "$firstchar" | grep -qE '[A-Z]'; then
              echo "FAIL: $sha first word after scope is not lowercase: $subj" >&2
              fail=1
            fi
          done < <(git rev-list "$base..$head")
          [ "$fail" -eq 0 ] && echo "OK: all subjects lowercase imperative"
          exit $fail

      - name: go mod tidy is clean
        run: |
          set -euo pipefail
          cp go.mod go.mod.bak
          [ -f go.sum ] && cp go.sum go.sum.bak || true
          go mod tidy
          if ! diff -q go.mod.bak go.mod >/dev/null; then
            echo "FAIL: go mod tidy modified go.mod" >&2
            diff go.mod.bak go.mod | head -50 >&2 || true
            exit 1
          fi
          if [ -f go.sum.bak ]; then
            if ! diff -q go.sum.bak go.sum >/dev/null; then
              echo "FAIL: go mod tidy modified go.sum" >&2
              diff go.sum.bak go.sum | head -50 >&2 || true
              exit 1
            fi
          elif [ -f go.sum ]; then
            echo "FAIL: go mod tidy created a go.sum that was not committed" >&2
            exit 1
          fi
          rm -f go.mod.bak go.sum.bak
          echo "OK: go mod tidy clean"

      - name: go build
        run: go build ./...

      # Vet ceiling: the v0.2.0 audit baseline was 8 warnings on darwin (mostly
      # unsafe.Pointer in coresim siblings and ghostcursor:992). Treat 8 as the
      # floor; any new warning fails the gate.
      - name: go vet (ceiling 8)
        run: |
          set -euo pipefail
          go vet ./... > vet.out 2>&1 || true
          count=$(wc -l < vet.out | tr -d ' ')
          echo "vet warnings: $count (ceiling 8)"
          if [ "$count" -gt 8 ]; then
            echo "FAIL: vet regression (count=$count > 8)" >&2
            cat vet.out >&2
            exit 1
          fi

      - name: go test
        run: go test ./...

      - name: No scratch files committed
        run: |
          set -euo pipefail
          fail=0
          # Tracked-file pattern check
          bad_paths=$(git ls-files | grep -E '(\.swp|\.bak|\.orig|\.DS_Store)$' || true)
          if [ -n "$bad_paths" ]; then
            echo "FAIL: scratch files tracked in git:" >&2
            echo "$bad_paths" >&2
            fail=1
          fi
          # Embedded /tmp/collab-* references in source / docs
          collab_hits=$(git grep -nE '/tmp/collab-' -- '*.go' '*.md' || true)
          if [ -n "$collab_hits" ]; then
            echo "FAIL: /tmp/collab-* path referenced in tracked source/docs:" >&2
            echo "$collab_hits" >&2
            fail=1
          fi
          # ITERM_SESSION_ID literals leaking into source / docs
          iterm_hits=$(git grep -nE 'ITERM_SESSION_ID' -- '*.go' '*.md' || true)
          if [ -n "$iterm_hits" ]; then
            echo "FAIL: ITERM_SESSION_ID literal in tracked source/docs:" >&2
            echo "$iterm_hits" >&2
            fail=1
          fi
          [ "$fail" -eq 0 ] && echo "OK: no scratch leakage"
          exit $fail
